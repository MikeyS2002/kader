# Wekelijkse her-scrape van het studio-aanbod.
#
# Draait elke maandagochtend (en handmatig via "Run workflow"). Als de data
# echt veranderd is (de scraper negeert generatedAt) wordt er gecommit —
# en die push triggert automatisch een nieuwe Vercel-deploy. Mislukt de
# scrape (sanity-guards in het script), dan faalt de job en mailt GitHub.

name: Wekelijkse studio-scrape

on:
  schedule:
    - cron: "23 5 * * 1" # maandag 05:23 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # geen dependencies nodig — de scraper is dependency-vrij
      - name: Scrape studio-aanbod
        run: node scripts/scrape-studios.mjs

      - name: Commit en push bij wijzigingen
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "data: wekelijkse her-scrape ($(date -u +%Y-%m-%d))"
            git push
            echo "Data bijgewerkt en gepusht — Vercel deployt automatisch."
          else
            echo "Geen wijzigingen in de data."
          fi
